<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SamBox Admin</title>

<style>

body{
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
    padding:30px;
}

.box{
    max-width:700px;
    margin:auto;
    background:#111;
    padding:30px;
    border-radius:20px;
    border:2px solid #ffd000;
}

h1,h2{
    text-align:center;
    color:#ffd000;
}

hr{
    border:1px solid #ffd000;
    margin:30px 0;
}

input,textarea,select{

    width:100%;
    padding:15px;
    margin:10px 0;
    background:#222;
    color:white;
    border:1px solid #ffd000;
    border-radius:10px;

}


button{

    width:100%;
    padding:18px;
    margin-top:20px;
    background:#ffd000;
    color:black;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;

}


label{

    display:block;
    margin-top:15px;
    color:#ffd000;

}

.issue-box{

    background:#181818;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
    border:1px solid #333;

}


</style>

</head>


<body>


<div class="box">


<h1>لوحة إدارة SamBox</h1>


<input id="token" type="password" placeholder="GitHub Token">


<button onclick="saveToken()">
حفظ التوكن
</button>



<hr>


<h2>إنشاء كوميكس جديد</h2>



<input id="title" placeholder="اسم الكوميكس">


<textarea id="description" placeholder="وصف الكوميكس"></textarea>



<select id="status">

<option>قيد الترجمة</option>

<option>مكتمل</option>

<option>متوقف</option>

</select>



<label>
صورة الغلاف:
</label>


<input id="cover" type="file" accept="image/*">



<label>
عدد الأعداد:
</label>


<input id="issues" type="number" placeholder="مثال: 6">



<button onclick="generateIssues()">
تجهيز الأعداد
</button>


<div id="issuesBox"></div>



<button onclick="createComic()">
إنشاء الكوميكس
</button>




<hr>



<h2>
إضافة عدد جديد لكوميكس موجود
</h2>



<input id="existingComic" placeholder="اسم مجلد الكوميكس">


<input id="issueNumber" type="number" placeholder="رقم العدد">



<label>
صفحات العدد:
</label>


<input id="newIssuePages" type="file" accept="image/*" multiple>



<button onclick="addIssue()">
إضافة العدد
</button>


</div>
<script>

function saveToken(){

let token = document.getElementById("token").value;

localStorage.setItem("sambox_token",token);

alert("تم حفظ التوكن");

}



function encode(data){

return btoa(
unescape(
encodeURIComponent(data)
)
);

}



async function fileToBase64(file){

return new Promise(resolve=>{

let reader = new FileReader();

reader.onload=()=>{

resolve(
reader.result.split(",")[1]
);

};

reader.readAsDataURL(file);

});

}




async function uploadFile(path,content,token,message){

const url =
`https://api.github.com/repos/Sambox-tm/Sam-Box-Comics/contents/${path}`;


return fetch(url,{

method:"PUT",

headers:{

"Authorization":"token "+token,

"Content-Type":"application/json"

},

body:JSON.stringify({

message:message,

content:content

})

});


}





function generateIssues(){

let count =
document.getElementById("issues").value;


let box =
document.getElementById("issuesBox");


box.innerHTML="";



for(let i=1;i<=count;i++){


box.innerHTML += `

<div class="issue-box">

<label>
صفحات العدد ${i}:
</label>

<input 
type="file"
id="issue-${i}"
accept="image/*"
multiple>

</div>

`;


}


}






async function createComic(){


const token =
localStorage.getItem("sambox_token");



if(!token){

alert("أدخل التوكن أولاً");

return;

}




const title =
document.getElementById("title").value;


const description =
document.getElementById("description").value;


const status =
document.getElementById("status").value;


const cover =
document.getElementById("cover").files[0];


const issueCount =
document.getElementById("issues").value;



if(!title || !cover || !issueCount){

alert("أكمل بيانات الكوميكس");

return;

}



const folder =
title.trim().replace(/\s+/g,"-");





const info={

title:title,

description:description,

status:status,

issues:issueCount

};




let infoUpload =
await uploadFile(

`comics/${folder}/info.json`,

encode(
JSON.stringify(info,null,2)
),

token,

"Add comic info"

);



if(!infoUpload.ok){

alert("خطأ في إنشاء معلومات الكوميكس");

return;

}




await uploadFile(

`comics/${folder}/cover.jpg`,

await fileToBase64(cover),

token,

"Add cover"

);






for(let i=1;i<=issueCount;i++){



let pages =
[
...document.getElementById(`issue-${i}`).files
];



for(let x=0;x<pages.length;x++){


await uploadFile(

`comics/${folder}/issue-${i}/page-${x+1}.jpg`,

await fileToBase64(pages[x]),

token,

`Add issue ${i} page ${x+1}`

);


}



}



alert("تم إنشاء الكوميكس بكل أعداده 🎉");



}








async function addIssue(){



const token =
localStorage.getItem("sambox_token");



if(!token){

alert("أدخل التوكن أولاً");

return;

}




const comic =
document.getElementById("existingComic").value;



const issue =
document.getElementById("issueNumber").value;



const pages =
[
...document.getElementById("newIssuePages").files
];



if(!comic || !issue || pages.length===0){

alert("أدخل اسم الكوميكس ورقم العدد والصفحات");

return;

}




for(let i=0;i<pages.length;i++){



await uploadFile(

`comics/${comic}/issue-${issue}/page-${i+1}.jpg`,

await fileToBase64(pages[i]),

token,

`Add issue ${issue} page ${i+1}`

);


}
const pagesInfo = {
    pages: pages.length
};

await uploadFile(
    `comics/${comic}/issue-${issue}/pages.json`,
    encode(JSON.stringify(pagesInfo, null, 2)),
    token,
    `Add pages.json for issue ${issue}`
);


alert("تمت إضافة العدد بنجاح 🎉");



}


</script>


</body>

    </html>
