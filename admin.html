<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SamBox Admin</title>

<style>

body {
    background:#050505;
    color:white;
    font-family:Arial, sans-serif;
    padding:30px;
}

.box {
    max-width:700px;
    margin:auto;
    background:#111;
    padding:30px;
    border-radius:20px;
    border:2px solid #ffd000;
}

h1 {
    text-align:center;
    color:#ffd000;
}

input, textarea, select {
    width:100%;
    padding:15px;
    margin:10px 0;
    background:#222;
    color:white;
    border:1px solid #ffd000;
    border-radius:10px;
}

button {
    width:100%;
    padding:18px;
    margin-top:20px;
    background:#ffd000;
    color:black;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

</style>

</head>


<body>


<div class="box">

<h1>لوحة SamBox</h1>

<input id="title" placeholder="اسم الكوميكس">

<textarea id="description" placeholder="وصف الكوميكس"></textarea>

<select id="status">
<option>مستمر</option>
<option>مكتمل</option>
</select>

<input id="pages" type="number" placeholder="عدد الصفحات">


<label>صورة الغلاف:</label>
<input id="cover" type="file" accept="image/*">


<label>صفحات الكوميكس:</label>
<input id="comicPages" type="file" accept="image/*" multiple>


<button>
إنشاء الكوميكس
</button>


</div>


</body>

</html>
