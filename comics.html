<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>جميع الكوميكس - SamBox</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<header>

    <div class="top-bar">

        <div class="logo">
            <img src="images/sambox-logo.png" alt="SamBox">
        </div>

        <div class="menu-btn">
            ☰
        </div>

    </div>

    <nav>

        <a href="index.html">الرئيسية</a>

        <a href="comics.html">جميع الكوميكس</a>

        <a href="#">الفريق</a>

        <a href="#">تواصل معنا</a>

    </nav>

</header>




<section class="popular">


<h2>
📚 جميع الكوميكس
</h2>

<div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="ابحث عن كوميكس..."
        onkeyup="searchComics()">
</div>

<div class="comics" id="comicsList">



<!-- غامبول -->

<a href="gumball-spring-break.html" class="comic-link">

<div class="card">


<div class="cover">

<img src="images/gumball.jpg" alt="غامبول: تحطيم عطلة الربيع">

</div>


<h3>
غامبول: تحطيم عطلة الربيع
</h3>


</div>

</a>



</div>


</section>




<script>

const menu = document.querySelector(".menu-btn");
const nav = document.querySelector("nav");

menu.onclick = () => {
    nav.classList.toggle("show");
};

</script>
<script>
function searchComics() {

    let input = document.getElementById("searchInput").value.toLowerCase();

    let cards = document.querySelectorAll(".comic-link");

    cards.forEach(function(card){

        let title = card.querySelector("h3").textContent.toLowerCase();

        if(title.includes(input)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }

    });

}
</script>
<script>
(async function () {

const comicsList = document.getElementById("comicsList");

const folders = await fetch("comics/list.json").then(r => r.json());

for(const comic of folders){

const res = await fetch(`comics/${comic}/info.json`);

if(!res.ok) continue;

const info = await res.json();

comicsList.innerHTML += `
<a href="comic.html?comic=${encodeURIComponent(comic)}" class="comic-link">

<div class="card">

<div class="cover">
<img src="comics/${comic}/cover.jpg" alt="${info.title}">
</div>

<h3>${info.title}</h3>

</div>

</a>
`;

}

}catch(e){}

})();
    </script>
</body>

</html>
