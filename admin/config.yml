backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "comics"
    label: "الكوميكس"
    folder: "pages"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "عنوان الكوميكس"
        name: "title"
        widget: "string"

      - label: "الوصف"
        name: "description"
        widget: "text"

      - label: "الحالة"
        name: "status"
        widget: "select"
        options:
          - "مستمر"
          - "مكتمل"
          - "متوقف"

      - label: "عدد الصفحات"
        name: "pages"
        widget: "number"

      - label: "صورة الغلاف"
        name: "cover"
        widget: "image"
